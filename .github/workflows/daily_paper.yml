name: Daily Paper Report

on:
  schedule:
    # 毎日 0:00 UTC = 9:00 JST
    - cron: "0 0 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: |
            data/db
            data/vector
          key: paper-data-${{ github.run_number }}
          restore-keys: |
            paper-data-

      - name: Run daily pipeline
        env:
          LLM_PROVIDER: gemini
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          ARXIV_TOPICS: ${{ vars.ARXIV_TOPICS || 'RAG,retrieval augmented generation' }}
          ARXIV_MAX_RESULTS_PER_TOPIC: ${{ vars.ARXIV_MAX_RESULTS_PER_TOPIC || '20' }}
          ARXIV_DAYS_BACK: "1"
          EMAIL_ENABLED: "true"
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          DB_PATH: data/db/papers.db
          VECTOR_DB_PATH: data/vector/chroma
          OUTPUT_DIR: output/reports
        run: uv run python main.py run

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: daily-report-${{ github.run_number }}
          path: output/reports/
          retention-days: 30
